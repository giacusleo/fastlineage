version: 2

seeds:
  - name: country_codes
    description: "{{ doc('country_codes__description') }}"
    config:
      column_types:
        record_id: string
        lookup_code: string
        display_name: string
        semantic_group: string
        is_active: boolean
    columns:
      - name: record_id
        description: "{{ doc('country_codes__record_id') }}"
        data_type: string
      - name: lookup_code
        description: "{{ doc('country_codes__lookup_code') }}"
        data_type: string
      - name: display_name
        description: "{{ doc('country_codes__display_name') }}"
        data_type: string
      - name: semantic_group
        description: "{{ doc('country_codes__semantic_group') }}"
        data_type: string
      - name: is_active
        description: "{{ doc('country_codes__is_active') }}"
        data_type: boolean
