version: 2

seeds:
  - name: warehouse_capacity
    description: "{{ doc('warehouse_capacity__description') }}"
    config:
      column_types:
        record_id: string
        lookup_code: string
        display_name: string
        semantic_group: string
        is_active: boolean
    columns:
      - name: record_id
        description: "{{ doc('warehouse_capacity__record_id') }}"
        data_type: string
      - name: lookup_code
        description: "{{ doc('warehouse_capacity__lookup_code') }}"
        data_type: string
      - name: display_name
        description: "{{ doc('warehouse_capacity__display_name') }}"
        data_type: string
      - name: semantic_group
        description: "{{ doc('warehouse_capacity__semantic_group') }}"
        data_type: string
      - name: is_active
        description: "{{ doc('warehouse_capacity__is_active') }}"
        data_type: boolean
