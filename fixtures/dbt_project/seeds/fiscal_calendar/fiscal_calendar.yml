version: 2

seeds:
  - name: fiscal_calendar
    description: "{{ doc('fiscal_calendar__description') }}"
    config:
      column_types:
        record_id: string
        lookup_code: string
        display_name: string
        semantic_group: string
        is_active: boolean
    columns:
      - name: record_id
        description: "{{ doc('fiscal_calendar__record_id') }}"
        data_type: string
      - name: lookup_code
        description: "{{ doc('fiscal_calendar__lookup_code') }}"
        data_type: string
      - name: display_name
        description: "{{ doc('fiscal_calendar__display_name') }}"
        data_type: string
      - name: semantic_group
        description: "{{ doc('fiscal_calendar__semantic_group') }}"
        data_type: string
      - name: is_active
        description: "{{ doc('fiscal_calendar__is_active') }}"
        data_type: boolean
