version: 2

seeds:
  - name: loyalty_thresholds
    description: "{{ doc('loyalty_thresholds__description') }}"
    config:
      column_types:
        record_id: string
        lookup_code: string
        display_name: string
        semantic_group: string
        is_active: boolean
    columns:
      - name: record_id
        description: "{{ doc('loyalty_thresholds__record_id') }}"
        data_type: string
      - name: lookup_code
        description: "{{ doc('loyalty_thresholds__lookup_code') }}"
        data_type: string
      - name: display_name
        description: "{{ doc('loyalty_thresholds__display_name') }}"
        data_type: string
      - name: semantic_group
        description: "{{ doc('loyalty_thresholds__semantic_group') }}"
        data_type: string
      - name: is_active
        description: "{{ doc('loyalty_thresholds__is_active') }}"
        data_type: boolean
