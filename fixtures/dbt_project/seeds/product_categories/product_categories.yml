version: 2

seeds:
  - name: product_categories
    description: "{{ doc('product_categories__description') }}"
    config:
      column_types:
        record_id: string
        lookup_code: string
        display_name: string
        semantic_group: string
        is_active: boolean
    columns:
      - name: record_id
        description: "{{ doc('product_categories__record_id') }}"
        data_type: string
      - name: lookup_code
        description: "{{ doc('product_categories__lookup_code') }}"
        data_type: string
      - name: display_name
        description: "{{ doc('product_categories__display_name') }}"
        data_type: string
      - name: semantic_group
        description: "{{ doc('product_categories__semantic_group') }}"
        data_type: string
      - name: is_active
        description: "{{ doc('product_categories__is_active') }}"
        data_type: boolean
