version: 2

seeds:
  - name: support_tiers
    description: "{{ doc('support_tiers__description') }}"
    config:
      column_types:
        record_id: string
        lookup_code: string
        display_name: string
        semantic_group: string
        is_active: boolean
    columns:
      - name: record_id
        description: "{{ doc('support_tiers__record_id') }}"
        data_type: string
      - name: lookup_code
        description: "{{ doc('support_tiers__lookup_code') }}"
        data_type: string
      - name: display_name
        description: "{{ doc('support_tiers__display_name') }}"
        data_type: string
      - name: semantic_group
        description: "{{ doc('support_tiers__semantic_group') }}"
        data_type: string
      - name: is_active
        description: "{{ doc('support_tiers__is_active') }}"
        data_type: boolean
