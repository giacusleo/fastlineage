version: 2

seeds:
  - name: marketing_channels
    description: "{{ doc('marketing_channels__description') }}"
    config:
      column_types:
        record_id: string
        lookup_code: string
        display_name: string
        semantic_group: string
        is_active: boolean
    columns:
      - name: record_id
        description: "{{ doc('marketing_channels__record_id') }}"
        data_type: string
      - name: lookup_code
        description: "{{ doc('marketing_channels__lookup_code') }}"
        data_type: string
      - name: display_name
        description: "{{ doc('marketing_channels__display_name') }}"
        data_type: string
      - name: semantic_group
        description: "{{ doc('marketing_channels__semantic_group') }}"
        data_type: string
      - name: is_active
        description: "{{ doc('marketing_channels__is_active') }}"
        data_type: boolean
