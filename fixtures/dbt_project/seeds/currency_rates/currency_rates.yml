version: 2

seeds:
  - name: currency_rates
    description: "{{ doc('currency_rates__description') }}"
    config:
      column_types:
        record_id: string
        lookup_code: string
        display_name: string
        semantic_group: string
        is_active: boolean
    columns:
      - name: record_id
        description: "{{ doc('currency_rates__record_id') }}"
        data_type: string
      - name: lookup_code
        description: "{{ doc('currency_rates__lookup_code') }}"
        data_type: string
      - name: display_name
        description: "{{ doc('currency_rates__display_name') }}"
        data_type: string
      - name: semantic_group
        description: "{{ doc('currency_rates__semantic_group') }}"
        data_type: string
      - name: is_active
        description: "{{ doc('currency_rates__is_active') }}"
        data_type: boolean
