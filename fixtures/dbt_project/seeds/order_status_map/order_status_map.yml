version: 2

seeds:
  - name: order_status_map
    description: "{{ doc('order_status_map__description') }}"
    config:
      column_types:
        record_id: string
        lookup_code: string
        display_name: string
        semantic_group: string
        is_active: boolean
    columns:
      - name: record_id
        description: "{{ doc('order_status_map__record_id') }}"
        data_type: string
      - name: lookup_code
        description: "{{ doc('order_status_map__lookup_code') }}"
        data_type: string
      - name: display_name
        description: "{{ doc('order_status_map__display_name') }}"
        data_type: string
      - name: semantic_group
        description: "{{ doc('order_status_map__semantic_group') }}"
        data_type: string
      - name: is_active
        description: "{{ doc('order_status_map__is_active') }}"
        data_type: boolean
